
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Hotel Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

.hero{
height:100vh;
position:relative;
}

canvas{
position:absolute;
top:0;
left:0;
}

.hero-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:2;
}

.hero-text h1{
font-size:70px;
letter-spacing:3px;
}

.hero-text p{
margin-top:15px;
font-size:20px;
opacity:0.85;
}

.btn{
margin-top:30px;
padding:14px 36px;
background:#d4af37;
border:none;
border-radius:40px;
font-weight:bold;
cursor:pointer;
}

.section{
padding:120px 10%;
text-align:center;
}

.section h2{
font-size:42px;
margin-bottom:60px;
}

.rooms{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.room{
background:#121212;
border-radius:14px;
overflow:hidden;
opacity:0;
transform:translateY(40px);
}

.room img{
width:100%;
height:220px;
object-fit:cover;
}

.room h3{
padding:20px;
}

footer{
text-align:center;
padding:40px;
background:black;
}

</style>
</head>

<body>

<section class="hero">
<canvas id="scene"></canvas>

<div class="hero-text">
<h1>Luxury Hotel</h1>
<p>Experience comfort beyond imagination</p>
<button class="btn">Book Your Stay</button>
</div>

</section>

<section class="section">
<h2>Our Rooms</h2>

<div class="rooms">

<div class="room">
<img src="https://images.unsplash.com/photo-1618773928121-c32242e63f39">
<h3>Deluxe Room</h3>
</div>

<div class="room">
<img src="https://images.unsplash.com/photo-1590490360182-c33d57733427">
<h3>Luxury Suite</h3>
</div>

<div class="room">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<h3>Presidential Suite</h3>
</div>

</div>

</section>

<footer>
Luxury Hotel © 2026
</footer>

<script>

// THREE SCENE

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000,10,60);

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("scene"),
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

// LIGHTING

const ambient = new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambient);

const directional = new THREE.DirectionalLight(0xffffff,1);
directional.position.set(5,10,5);
scene.add(directional);

// GROUND

const groundGeo = new THREE.PlaneGeometry(200,200);
const groundMat = new THREE.MeshStandardMaterial({color:0x111111});
const ground = new THREE.Mesh(groundGeo,groundMat);

ground.rotation.x = -Math.PI/2;
scene.add(ground);

// HOTEL BUILDING

function createHotel(){

const group = new THREE.Group();

const baseGeo = new THREE.BoxGeometry(8,3,6);
const baseMat = new THREE.MeshStandardMaterial({color:0x333333});
const base = new THREE.Mesh(baseGeo,baseMat);
base.position.y = 1.5;
group.add(base);

for(let i=0;i<5;i++){

const floorGeo = new THREE.BoxGeometry(8,2,6);
const floorMat = new THREE.MeshStandardMaterial({color:0x444444});
const floor = new THREE.Mesh(floorGeo,floorMat);

floor.position.y = 3 + i*2;
group.add(floor);

}

return group;

}

const hotel = createHotel();
scene.add(hotel);

// WINDOWS

const windowMat = new THREE.MeshStandardMaterial({color:0xffe8a3,emissive:0xffd27f});

for(let i=-3;i<=3;i+=2){
for(let j=1;j<=5;j++){

const geo = new THREE.PlaneGeometry(0.8,0.8);
const mesh = new THREE.Mesh(geo,windowMat);

mesh.position.set(i,j*2,3.01);
scene.add(mesh);

}
}

// CAMERA

camera.position.set(0,6,20);

// ANIMATION

function animate(){

requestAnimationFrame(animate);

hotel.rotation.y += 0.001;

renderer.render(scene,camera);

}

animate();

// SCROLL ANIMATIONS

gsap.utils.toArray(".room").forEach(room=>{

gsap.to(room,{
scrollTrigger:{
trigger:room,
start:"top 85%"
},
opacity:1,
y:0,
duration:1
});

});

// RESIZE

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
