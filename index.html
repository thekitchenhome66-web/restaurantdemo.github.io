
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Hotel Experience V2</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

#threeCanvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:60px;
letter-spacing:2px;
}

.hero p{
margin-top:20px;
font-size:18px;
opacity:0.9;
}

.btn{
margin-top:30px;
padding:14px 34px;
background:#d4af37;
border:none;
color:black;
font-weight:bold;
cursor:pointer;
border-radius:40px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* SECTION */

.section{
padding:120px 10%;
text-align:center;
}

.section h2{
font-size:42px;
margin-bottom:60px;
}

/* ROOMS */

.rooms{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.room{
background:#121212;
border-radius:14px;
overflow:hidden;
transform:translateY(40px);
opacity:0;
}

.room img{
width:100%;
height:220px;
object-fit:cover;
}

.room h3{
padding:20px;
}

/* AMENITIES */

.amenities{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:30px;
}

.amenity{
background:#121212;
padding:40px;
border-radius:12px;
opacity:0;
transform:translateY(40px);
}

/* BOOKING */

.booking{
height:60vh;
background:#111;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

footer{
padding:40px;
text-align:center;
background:black;
}

</style>
</head>

<body>

<section class="hero">
<canvas id="threeCanvas"></canvas>

<div class="hero-content">
<h1>Luxury Hotel Experience</h1>
<p>Discover comfort, elegance, and unforgettable stays</p>
<button class="btn">Book Your Stay</button>
</div>

</section>

<section class="section">
<h2>Our Rooms</h2>

<div class="rooms">

<div class="room">
<img src="https://images.unsplash.com/photo-1618773928121-c32242e63f39">
<h3>Deluxe Room</h3>
</div>

<div class="room">
<img src="https://images.unsplash.com/photo-1590490360182-c33d57733427">
<h3>Luxury Suite</h3>
</div>

<div class="room">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<h3>Presidential Suite</h3>
</div>

</div>
</section>

<section class="section">
<h2>Amenities</h2>

<div class="amenities">
<div class="amenity">Infinity Pool</div>
<div class="amenity">Luxury Spa</div>
<div class="amenity">Fine Dining</div>
<div class="amenity">Modern Gym</div>
</div>

</section>

<section class="booking">
<h2>Reserve Your Experience</h2>
<p>Book directly and enjoy exclusive benefits</p>
<br>
<button class="btn">Reserve Now</button>
</section>

<footer>
Luxury Hotel © 2026
</footer>

<script>

// GSAP animations
gsap.utils.toArray(".room").forEach(room=>{
gsap.to(room,{
scrollTrigger:{trigger:room,start:"top 80%"},
opacity:1,
y:0,
duration:1
});
});

gsap.utils.toArray(".amenity").forEach(item=>{
gsap.to(item,{
scrollTrigger:{trigger:item,start:"top 85%"},
opacity:1,
y:0,
duration:1
});
});

// THREE.JS SCENE

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("threeCanvas"),
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

const geometry = new THREE.BoxGeometry(3,1.5,2);
const material = new THREE.MeshStandardMaterial({color:0xd4af37});

const hotel = new THREE.Mesh(geometry,material);
scene.add(hotel);

const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

camera.position.z = 5;

function animate(){

requestAnimationFrame(animate);

hotel.rotation.y += 0.003;

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
